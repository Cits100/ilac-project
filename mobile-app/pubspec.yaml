name: proyectotitulo_app
description: "ILAC Interflon - Aplicación de mantenimiento"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter

  # HTTP client
  http: ^1.2.0
  
  # Local database
  sqflite: ^2.3.0
  path: ^1.8.0
  
  # Secure storage for credentials
  flutter_secure_storage: ^9.0.0
  
  # State management
  provider: ^6.1.0
  
  # Connectivity check
  connectivity_plus: ^6.0.0
  
  # Image picker (camera/gallery)
  image_picker: ^1.0.0
  
  # Permissions
  permission_handler: ^11.0.0
  
  # Background tasks
  workmanager: ^0.6.0
  
  # Local notifications
  flutter_local_notifications: ^17.0.0
  
  # Date formatting
  intl: ^0.19.0
  
  # Cached network images
  cached_network_image: ^3.3.0
  
  # Loading shimmer effect
  shimmer: ^3.0.0
  
  # Material icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
